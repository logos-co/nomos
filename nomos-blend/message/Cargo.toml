[package]
edition = "2021"
license = { workspace = true }
name    = "nomos-blend-message"
version = "0.1.0"

[dependencies]
blake2.workspace = true
bytes.workspace  = true
chacha20         = "0.9.1"
cipher           = "0.4.4"
ed25519-dalek    = { features = ["rand_core"], version = "2" }
itertools        = "0.13"
rand_chacha      = "0.3"
sha2             = "0.10"
sphinx-packet    = "0.2"
thiserror        = "1.0.65"
x25519-dalek     = { features = ["getrandom", "serde", "static_secrets"], version = "2.0.1" }
